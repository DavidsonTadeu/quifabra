<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minha Conta — Quifabra</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231E96C8'/><text y='24' x='4' font-size='22' font-family='Arial Black' font-weight='900' fill='white'>Q</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { background: #f4f5f7; }
    
    .account-hero {
      background: linear-gradient(135deg, #1D2533 0%, #1E96C8 100%);
      padding: 60px 0 40px;
      color: white;
    }
    .account-hero h1 { font-family: var(--font-heading); font-size: 2.2rem; font-weight: 900; }
    .account-hero p { font-size: 1rem; color: rgba(255,255,255,.8); margin-top: 8px; }

    .account-layout {
      max-width: 1000px; margin: 40px auto; padding: 0 24px;
      display: grid; grid-template-columns: 280px 1fr; gap: 32px;
    }
    @media (max-width: 768px) { .account-layout { grid-template-columns: 1fr; } }

    /* Sidebar */
    .account-sidebar { background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,.05); padding: 24px; }
    .user-info { margin-bottom: 24px; border-bottom: 1px solid #e8eaed; padding-bottom: 24px; }
    .user-avatar { width: 60px; height: 60px; background: #e0f2fe; color: #1E96C8; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--font-heading); font-size: 1.5rem; font-weight: 900; margin-bottom: 12px; }
    .user-name { font-family: var(--font-heading); font-size: 1.1rem; font-weight: 800; color: #1D2533; }
    .user-email { font-size: .85rem; color: #6b7280; }
    
    .nav-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 12px 16px; border: none; background: none; text-align: left; font-family: var(--font-body); font-weight: 600; font-size: .9rem; color: #6b7280; border-radius: 10px; cursor: pointer; transition: all .2s; }
    .nav-btn.active { background: #e0f2fe; color: #1E96C8; }
    .nav-btn:hover:not(.active) { background: #f3f4f6; }
    .nav-btn svg { width: 18px; height: 18px; }

    /* Main Content */
    .account-content { background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,.05); padding: 32px; }
    .content-header { border-bottom: 1px solid #e8eaed; padding-bottom: 16px; margin-bottom: 24px; }
    .content-header h2 { font-family: var(--font-heading); font-size: 1.3rem; font-weight: 800; color: #1D2533; }

    /* Orders List */
    .order-card { border: 1.5px solid #e8eaed; border-radius: 12px; margin-bottom: 20px; overflow: hidden; }
    .order-header { background: #fafafa; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e8eaed; flex-wrap: wrap; gap: 12px; }
    .order-meta div { font-size: .75rem; font-weight: 700; color: #9ca3af; text-transform: uppercase; margin-bottom: 4px; }
    .order-meta span { font-size: .9rem; font-weight: 600; color: #1D2533; }
    .order-total { font-family: var(--font-heading); font-weight: 800; color: #1D2533; }

    .order-body { padding: 20px; }
    .order-item { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; font-size: .9rem; }
    .order-item:last-child { margin-bottom: 0; }
    
    /* Tracker */
    .order-tracker { margin-top: 24px; padding-top: 24px; border-top: 1px dashed #e8eaed; }
    .tracker-steps { display: flex; justify-content: space-between; position: relative; }
    .tracker-line { position: absolute; top: 12px; left: 0; right: 0; height: 3px; background: #e8eaed; z-index: 1; }
    .tracker-line-fill { position: absolute; top: 0; left: 0; height: 100%; background: #00a650; width: 0%; transition: width .5s; }
    
    .tracker-step { display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 2; position: relative; width: 60px; text-align: center; }
    .tracker-dot { width: 26px; height: 26px; border-radius: 50%; background: #e8eaed; border: 3px solid white; display: flex; align-items: center; justify-content: center; color: white; font-size: .7rem; font-weight: bold; }
    .tracker-label { font-size: .7rem; font-weight: 700; color: #9ca3af; line-height: 1.2; }
    
    .tracker-step.active .tracker-dot { background: #00a650; }
    .tracker-step.active .tracker-label { color: #00a650; }

    /* Auth screen */
    .auth-screen { min-height: 80vh; display: flex; align-items: center; justify-content: center; background: #ebebeb; }
  </style>
</head>
<body>

<header class="navbar" id="navbar" style="background:white; box-shadow: 0 1px 10px rgba(0,0,0,.05);">
  <div class="container">
    <nav class="navbar__inner">
      <a href="index.html" class="navbar__logo">
        <svg viewBox="0 0 140 50" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="38" height="38" rx="8" fill="#1E96C8"/>
          <text x="7" y="30" font-family="Arial Black" font-size="26" font-weight="900" fill="white">Q</text>
          <text x="44" y="24" font-family="Arial Black" font-size="20" font-weight="900" fill="#1E96C8">UIFABRA</text>
        </svg>
      </a>
      <a href="loja.html" style="font-size:.85rem;color:var(--color-primary);font-weight:600;">Voltar à Loja</a>
    </nav>
  </div>
</header>

<div id="unauth-view" style="display:none;" class="auth-screen">
  
  <!-- Formulário de Login -->
  <div class="ml-card" id="form-login">
    <div class="ml-field">
      <label class="ml-label" for="login-email">E-mail</label>
      <input class="ml-input" type="email" id="login-email" placeholder="Ex: joao@email.com" />
    </div>
    <div class="ml-field">
      <label class="ml-label" for="login-senha">Senha</label>
      <input class="ml-input" type="password" id="login-senha" placeholder="Sua senha" />
    </div>
    <div id="login-error" class="ml-error"></div>
    <button class="ml-btn ml-btn-primary" style="margin-top: 16px;" onclick="doLogin()">Continuar</button>
    <a class="ml-link" onclick="toggleAuthForm('register')">Criar conta</a>
    
    <div class="ml-divider">ou</div>
    
    <button id="google-login-btn" class="ml-google-btn">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Fazer Login com o Google
    </button>
  </div>

  <!-- Formulário de Cadastro -->
  <div class="ml-card" id="form-register" style="display:none;">
    <div class="ml-title">Complete seus dados</div>
    <div class="ml-field">
      <label class="ml-label" for="reg-email">E-mail</label>
      <input class="ml-input" type="email" id="reg-email" placeholder="exemplo@email.com" />
    </div>
    <div class="ml-field">
      <label class="ml-label" for="reg-nome">Nome completo</label>
      <input class="ml-input" type="text" id="reg-nome" placeholder="Seu nome" />
    </div>
    <div class="ml-field" style="display:flex; gap:10px;">
      <div style="flex:1;">
        <label class="ml-label" for="reg-cpf">CPF</label>
        <input class="ml-input" type="text" id="reg-cpf" placeholder="000.000.000-00" oninput="if(window.maskCPF) window.maskCPF(this);" />
      </div>
      <div style="flex:1;">
        <label class="ml-label" for="reg-celular">Celular</label>
        <input class="ml-input" type="text" id="reg-celular" placeholder="(00) 00000-0000" oninput="if(window.maskCel) window.maskCel(this);" />
      </div>
    </div>
    <div class="ml-field">
      <label class="ml-label" for="reg-senha">Senha</label>
      <input class="ml-input" type="password" id="reg-senha" placeholder="Mínimo 6 caracteres" />
    </div>
    <div id="reg-error" class="ml-error"></div>
    <button class="ml-btn ml-btn-primary" style="margin-top: 16px;" onclick="doRegister()">Continuar</button>
    <a class="ml-link" onclick="toggleAuthForm('login')">Já tenho conta</a>
  </div>

  <!-- Completar Cadastro Google -->
  <div class="ml-card" id="form-complete-google" style="display:none;">
    <div class="ml-title">Quase lá!</div>
    <p style="text-align:center; font-size: 0.9rem; color: #666; margin-bottom: 20px;">Falta pouco para criar sua conta. Confirme seus dados.</p>
    
    <div class="ml-field">
      <label class="ml-label" for="google-nome-display">Nome</label>
      <input class="ml-input" type="text" id="google-nome-display" disabled style="background:#f5f5f5;" />
    </div>
    <div class="ml-field">
      <label class="ml-label" for="google-email-display">E-mail</label>
      <input class="ml-input" type="text" id="google-email-display" disabled style="background:#f5f5f5;" />
    </div>
    <div class="ml-field" style="display:flex; gap:10px;">
      <div style="flex:1;">
        <label class="ml-label" for="google-cpf">CPF</label>
        <input class="ml-input" type="text" id="google-cpf" placeholder="000.000.000-00" oninput="if(window.maskCPF) window.maskCPF(this);" />
      </div>
      <div style="flex:1;">
        <label class="ml-label" for="google-celular">Celular</label>
        <input class="ml-input" type="text" id="google-celular" placeholder="(00) 00000-0000" oninput="if(window.maskCel) window.maskCel(this);" />
      </div>
    </div>
    
    <div id="google-error" class="ml-error"></div>
    <button class="ml-btn ml-btn-primary" style="margin-top: 16px;" onclick="saveGoogleProfile()">Finalizar Cadastro</button>
  </div>

</div>

<div id="auth-view" style="display:none;">
  <div class="account-hero">
    <div class="container">
      <h1>Minha Conta</h1>
      <p>Acompanhe seus pedidos e detalhes de entrega</p>
    </div>
  </div>

  <div class="account-layout">
    <aside class="account-sidebar">
      <div class="user-info">
        <div class="user-avatar" id="user-avatar">?</div>
        <div class="user-name" id="user-name-display">Carregando...</div>
        <div class="user-email" id="user-email-display"></div>
      </div>
      <nav>
        <button class="nav-btn active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
          Meus Pedidos
        </button>
        <button class="nav-btn" onclick="logout()" style="color:#ef4444; margin-top:16px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sair da Conta
        </button>
      </nav>
    </aside>

    <main class="account-content">
      <div class="content-header">
        <h2>Histórico de Pedidos</h2>
      </div>
      <div id="orders-container">
        <!-- JS injeta os pedidos aqui -->
        <div style="text-align:center; padding:40px; color:#9ca3af;">Carregando pedidos...</div>
      </div>
    </main>
  </div>
</div>

<!-- Usaremos o config unificado do Firebase -->
<script type="module" src="js/conta.js"></script>
</body>
</html>
